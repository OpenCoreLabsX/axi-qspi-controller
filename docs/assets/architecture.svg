<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340">
  <rect width="960" height="340" fill="#f8fafc"/>
  <defs>
    <style>
      .box{fill:#fff;stroke:#2563eb;stroke-width:2;rx:8}
      .sub{fill:#eef2ff;stroke:#94a3b8;stroke-width:1.5;rx:8}
      .txt{font:700 15px Arial;fill:#111827}
      .sm{font:12px Arial;fill:#475569}
      .bus{stroke:#0f172a;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect class="box" x="28" y="52" width="170" height="92"/>
  <text class="txt" x="58" y="88">AXI4 Register</text>
  <text class="sm" x="58" y="112">control/status</text>
  <rect class="box" x="28" y="196" width="170" height="92"/>
  <text class="txt" x="54" y="232">AXI4 XIP Read</text>
  <text class="sm" x="58" y="256">memory mapped</text>
  <rect class="sub" x="270" y="42" width="150" height="90"/>
  <text class="txt" x="306" y="80">TX FIFO</text>
  <text class="sm" x="302" y="104">program data</text>
  <rect class="sub" x="270" y="208" width="150" height="90"/>
  <text class="txt" x="306" y="246">RX FIFO</text>
  <text class="sm" x="300" y="270">readback data</text>
  <rect class="box" x="492" y="92" width="190" height="150"/>
  <text class="txt" x="538" y="140">QSPI Core</text>
  <text class="sm" x="532" y="166">SPI / Dual / Quad</text>
  <text class="sm" x="524" y="190">cmd + addr + dummy</text>
  <text class="sm" x="532" y="214">XIP mode byte</text>
  <rect class="box" x="760" y="92" width="150" height="150"/>
  <text class="txt" x="798" y="140">Flash IO</text>
  <text class="sm" x="792" y="166">SCLK / CS_N</text>
  <text class="sm" x="790" y="190">IO[3:0] OE</text>
  <line class="bus" x1="198" y1="98" x2="270" y2="88"/>
  <line class="bus" x1="198" y1="242" x2="270" y2="252"/>
  <line class="bus" x1="420" y1="88" x2="492" y2="140"/>
  <line class="bus" x1="492" y1="204" x2="420" y2="252"/>
  <line class="bus" x1="682" y1="167" x2="760" y2="167"/>
</svg>
